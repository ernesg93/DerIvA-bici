schema: spec-driven

context: |
  Tech stack: Next.js 15 + React 19 + TypeScript 5 (App Router).
  Architecture: App Router with brand-driven content modules (`src/brands`, `src/core`).
  Testing: No test runner configured yet.
  Style: ESLint (next/core-web-vitals), TS strict mode.

strict_tdd: false

testing:
  strict_tdd_mode: disabled
  detected: 2026-04-10
  test_runner:
    available: false
    framework: null
    command: null
  layers:
    unit:
      available: false
      tool: null
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality_tools:
    linter:
      available: true
      command: npm run lint
    type_checker:
      available: true
      command: npx tsc --noEmit
    formatter:
      available: false
      command: null

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
